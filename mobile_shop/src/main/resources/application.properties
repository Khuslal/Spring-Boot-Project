# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=8080
server.servlet.context-path=/

# ===========================================
# DATABASE CONFIGURATION (MySQL)
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/mobile_shop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================================
# eSewa PAYMENT CONFIGURATION
# ===========================================
# UAT (Testing) Environment
esewa.merchant.code=EPAYTEST
esewa.merchant.secret=8gBm/:&EnhH.1/q

# ===========================================
# ADMIN CONFIGURATION
# ===========================================
admin.signup.key=ADMIN_SECRET_KEY_12345

# ===========================================
# APPLICATION CONFIGURATION
# ===========================================
app.name=MobileShop
app.version=1.0.0
app.base-url=http://localhost:8080

# ===========================================
# FILE UPLOAD CONFIGURATION
# ===========================================
file.upload.directory=src/main/resources/static/images/products
file.upload.max-file-size=10MB
file.upload.max-request-size=10MB

# ===========================================
# EMAIL CONFIGURATION (Optional)
# ===========================================
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ===========================================
# SECURITY CONFIGURATION
# ===========================================
# Custom messages
spring.security.login.error=Invalid email or password
spring.security.logout.success=You have been logged out successfully

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
logging.level.root=INFO
logging.level.com.mobile_shop=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===========================================
# THYMELEAF CONFIGURATION
# ===========================================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===========================================
# SESSION CONFIGURATION
# ===========================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=MOBILESESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false


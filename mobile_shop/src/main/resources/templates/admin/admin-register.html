<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            margin: 20px;
        }

        .register-header {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 30px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }

        .register-header h3 {
            margin: 0;
            font-weight: 700;
        }

        .register-body {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .form-control:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
        }

        .text-center {
            text-align: center;
            margin-top: 20px;
        }

        .text-center a {
            color: #e74c3c;
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <div class="register-header">
            <h3><i class="fas fa-user-shield me-2"></i>Admin Registration</h3>
        </div>

        <div class="register-body">
            <form th:action="@{/admin/register}" method="post">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="adminFullname" class="form-control" placeholder="Enter full name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="adminEmail" class="form-control" placeholder="admin@example.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="adminPassword" class="form-control" placeholder="Enter password"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Admin Secret Key</label>
                    <input type="password" name="secretKey" class="form-control" placeholder="Provided by system owner"
                        required>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus me-2"></i>Create Admin Account
                </button>
            </form>

            <!-- Error Message -->
            <div class="alert alert-danger" th:if="${error}"
                style="background: #f8d7da; color: #721c24; border-left: 4px solid #721c24;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Success Message -->
            <div class="alert alert-success" th:if="${success}"
                style="background: #d4edda; color: #155724; border-left: 4px solid #155724;">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
            </div>

            <div class="text-center">
                <a href="/admin/login"><i class="fas fa-arrow-left me-1"></i> Back to Admin Login</a>
            </div>
        </div>
    </div>

</body>

</html>

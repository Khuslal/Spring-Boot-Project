<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form - MobileShop Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
        }

        .admin-navbar {
            background: #1a1a2e !important;
        }

        .admin-navbar .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            color: rgba(255, 255, 255, 0.85);
            border-radius: 8px;
            text-decoration: none;
        }

        .admin-navbar .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .admin-navbar .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00d4ff;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark admin-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/admin/dashboard}">
                <i class="fas fa-cogs"></i>
                Admin Panel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/dashboard}">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/products}">
                            <i class="fas fa-box"></i>
                            Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/orders}">
                            <i class="fas fa-shopping-cart"></i>
                            Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/customers}">
                            <i class="fas fa-users"></i>
                            Customers
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i>
                            Admin
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/admin/profile}">
                                    <i class="fas fa-user me-2"></i>
                                    Profile
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item text-danger" th:href="@{/logout}">
                                    <i class="fas fa-sign-out-alt me-2"></i>
                                    Logout
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4" style="padding-top: 80px;">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="${product.productId != null ? 'Edit Product' : 'Add New Product'}">
                            Product Form
                        </h4>
                    </div>
                    <div class="card-body">
                        <form
                            th:action="${product.productId != null ? '/admin/product/edit/' + product.productId : '/admin/product/add'}"
                            method="post" enctype="multipart/form-data">

                            <div class="row">
                                <!-- Left Column -->
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Product Name *</label>
                                        <input type="text" class="form-control" name="productName"
                                            th:value="${product.productName}" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Brand *</label>
                                        <select class="form-select" name="brand" required>
                                            <option value="">Select Brand</option>
                                            <option value="Samsung" th:selected="${product.brand == 'Samsung'}">Samsung
                                            </option>
                                            <option value="Apple" th:selected="${product.brand == 'Apple'}">Apple
                                            </option>
                                            <option value="OnePlus" th:selected="${product.brand == 'OnePlus'}">OnePlus
                                            </option>
                                            <option value="Xiaomi" th:selected="${product.brand == 'Xiaomi'}">Xiaomi
                                            </option>
                                            <option value="Google" th:selected="${product.brand == 'Google'}">Google
                                            </option>
                                            <option value="Other" th:selected="${product.brand == 'Other'}">Other
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Category *</label>
                                        <select class="form-select" name="category" required>
                                            <option value="">Select Category</option>
                                            <option value="Smartphone"
                                                th:selected="${product.category == 'Smartphone'}">Smartphone</option>
                                            <option value="Tablet" th:selected="${product.category == 'Tablet'}">Tablet
                                            </option>
                                            <option value="Accessory" th:selected="${product.category == 'Accessory'}">
                                                Accessory</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Price (₹) *</label>
                                        <input type="number" class="form-control" name="price"
                                            th:value="${product.price}" min="0" step="0.01" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Available Stock *</label>
                                        <input type="number" class="form-control" name="availableStock"
                                            th:value="${product.availableStock}" min="0" required>
                                    </div>
                                </div>

                                <!-- Right Column -->
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" name="description" rows="3"
                                            th:text="${product.description}"></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Features</label>
                                        <textarea class="form-control" name="features" rows="3"
                                            th:text="${product.features}"></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Product Image</label>
                                        <input type="file" class="form-control" name="imageFile" accept="image/*">
                                        <small class="text-muted">Leave empty to keep existing image</small>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Status</label>
                                        <select class="form-select" name="status">
                                            <option value="ACTIVE" th:selected="${product.status == 'ACTIVE'}">Active
                                            </option>
                                            <option value="INACTIVE" th:selected="${product.status == 'INACTIVE'}">
                                                Inactive</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <div class="mt-3">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>
                                    <span
                                        th:text="${product.productId != null ? 'Update Product' : 'Add Product'}">Save</span>
                                </button>
                                <a th:href="@{/admin/products}" class="btn btn-secondary ms-2">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
